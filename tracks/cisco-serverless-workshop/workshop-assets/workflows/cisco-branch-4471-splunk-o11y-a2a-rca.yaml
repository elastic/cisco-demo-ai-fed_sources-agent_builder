# Cisco workshop (Elastic Cloud Serverless Search):
# Branch 4471 incident → Elastic ES|QL context → Splunk Observability A2A (stubbed) → unified RCA
#
# Lab default: the A2A step returns a FAKE Splunk O11Y investigator response so the
# workflow runs end-to-end without an external gateway. Swap the stub step for a real
# `http` POST to consts.splunk_o11y_a2a_url when you have a bridge.
#
# Setup:
#   1. Kibana → Workflows → open cisco-branch-4471-splunk-o11y-a2a-rca (seeded at lab start).
#   2. Run manually with site=Branch-4471-Dallas (defaults ready for the lab inject).

version: "1"
name: Cisco Branch 4471 — Splunk O11Y A2A RCA
enabled: true
description: >
  Manual workshop workflow: gather Meraki + BGP context from Elastic Serverless Search,
  inject a stubbed Splunk Observability A2A investigator response (demo), then synthesize
  a cross-platform RCA with Agent Builder for Branch 4471.
tags:
  - cisco
  - serverless-search
  - splunk
  - splunk-o11y
  - a2a
  - rca
  - workshop
  - stub

triggers:
  - type: manual
    inputs:
      - name: site
        type: string
        default: "Branch-4471-Dallas"
      - name: device_hint
        type: string
        default: "4471"

consts:
  # Production: replace the stub step with an http POST to this URL.
  splunk_o11y_a2a_url: "https://REPLACE_WITH_YOUR_A2A_GATEWAY.example.com/a2a/splunk-o11y-investigator"
  a2a_mode: "stub"

steps:
  - name: meraki_context
    type: elasticsearch.esql.query
    with:
      format: json
      query: |
        FROM cisco-meraki-events
        | WHERE @timestamp > NOW() - 24 hours
        | WHERE site LIKE "*{{ inputs.device_hint }}*" OR device_name LIKE "*{{ inputs.device_hint }}*"
        | SORT @timestamp DESC
        | KEEP @timestamp, site, device_name, device_serial, event_type, detail
        | LIMIT 25

  - name: network_context
    type: elasticsearch.esql.query
    with:
      format: json
      query: |
        FROM cisco-network-events
        | WHERE @timestamp > NOW() - 24 hours
        | WHERE `cisco.site` LIKE "*{{ inputs.device_hint }}*"
           OR event_type LIKE "bgp*"
           OR event_type LIKE "dna*"
        | SORT @timestamp DESC
        | KEEP @timestamp, `cisco.site`, `host.name`, `cisco.product`, event_type, message
        | LIMIT 25

  - name: kb_runbooks
    type: elasticsearch.esql.query
    with:
      format: json
      query: |
        FROM cisco-network-kb
        | WHERE MATCH(content, "offline") OR MATCH(content, "BGP neighbor") OR MATCH(title, "BGP")
        | KEEP title, product, category, content, doc_id
        | LIMIT 10

  # Demo: log the A2A request shape that would be sent to a real gateway.
  - name: a2a_request_preview
    type: console
    with:
      message: |
        [A2A STUB] Would POST jsonrpc message/send → {{ consts.splunk_o11y_a2a_url }}
        Site={{ inputs.site }} device_hint={{ inputs.device_hint }} mode={{ consts.a2a_mode }}
        Meraki rows available for the A2A agent; network + KB context attached in real call.

  # Workshop stub: fake Splunk Observability A2A investigator response (JSON-RPC 2.0 / A2A-shaped).
  # To go live: delete this step and restore an `http` POST to consts.splunk_o11y_a2a_url.
  - name: splunk_o11y_a2a_investigate
    type: data.parseJson
    source: |
      {
        "jsonrpc": "2.0",
        "id": "cisco-branch-4471-a2a-stub",
        "result": {
          "role": "agent",
          "kind": "message",
          "metadata": {
            "source": "splunk-o11y-a2a-stub",
            "mode": "workshop_demo",
            "agent": "splunk-o11y-investigator",
            "site": "Branch-4471-Dallas"
          },
          "parts": [
            {
              "type": "text",
              "text": "Here's what Splunk Observability correlated for Branch-4471-Dallas:\n\n## Splunk O11Y Correlated Issues\n\n> Data is from the A2A workshop stub (mode=workshop_demo) — directionally corroborating, not live production telemetry.\n\n### Detectors Fired\n- WAN_EDGE_BGP_SESSION_DOWN — Critical — entity edge-dfw-01 — fired ~18 min ago\n- MERAKI_AP_CLOUD_DISCONNECT — Major — entity MR-AP-4471 — fired ~14 min ago (~4 min after BGP)\n\n### Key Metrics\n- WAN latency p95: 420 ms (baseline ~35 ms — ~12x above normal)\n- Uplink saturation on TenGigE0/0/1 toward ISP-A: 91%\n- BGP session state: Idle (neighbor 203.0.113.1)\n\n### Log Observer Patterns\n- BGP neighbor 203.0.113.1 Idle / Active (repeated)\n- Meraki Dashboard: AP MR-AP-4471 went offline\n- DNA Center: site Branch-4471 reachability degraded\n\n### Splunk's Hypothesis\nWAN/BGP failure on edge-dfw-01 caused Meraki cloud disconnect at the branch — not a local AP hardware fault.\n\nBottom line: Both platforms point to ISP-A circuit congestion/failure on edge-dfw-01 as the root cause. The AP is physically healthy — do not RMA until WAN recovers."
            }
          ],
          "artifacts": [
            {
              "name": "splunk_o11y_evidence",
              "description": "Synthetic detector + metric evidence for the Cisco workshop A2A demo",
              "parts": [
                {
                  "type": "data",
                  "data": {
                    "detectors": [
                      {
                        "id": "det-wan-edge-bgp-4471",
                        "name": "WAN_EDGE_BGP_SESSION_DOWN",
                        "severity": "Critical",
                        "entity": "edge-dfw-01",
                        "site": "Branch-4471-Dallas",
                        "fired_at": "relative:-18m",
                        "deep_link": "https://app.us1.signalfx.com/#/detector/det-wan-edge-bgp-4471"
                      },
                      {
                        "id": "det-meraki-ap-cloud-4471",
                        "name": "MERAKI_AP_CLOUD_DISCONNECT",
                        "severity": "Major",
                        "entity": "MR-AP-4471",
                        "site": "Branch-4471-Dallas",
                        "fired_at": "relative:-14m",
                        "deep_link": "https://app.us1.signalfx.com/#/detector/det-meraki-ap-cloud-4471"
                      }
                    ],
                    "metrics": {
                      "wan_edge_latency_p95_ms": 420,
                      "wan_edge_latency_baseline_ms": 35,
                      "uplink_saturation_pct": 91,
                      "bgp_session_state": "Idle"
                    },
                    "log_patterns": [
                      "BGP neighbor 203.0.113.1 Idle / Active",
                      "Meraki Dashboard: AP MR-AP-4471 went offline",
                      "DNA Center: site Branch-4471 reachability degraded"
                    ],
                    "likely_root_cause": "BGP session failure on edge-dfw-01 (ISP-A path) precipitating Meraki cloud disconnect",
                    "recommended_actions": [
                      "Engage transport/ISP for circuit toward 203.0.113.1",
                      "Check BGP flap history and interface errors on TenGigE0/0/1",
                      "After BGP recovers, confirm Meraki AP returns online; avoid RMA until WAN is healthy",
                      "Cross-check Elastic cisco-network-kb runbooks for BGP neighbor idle + Meraki offline"
                    ]
                  }
                }
              ]
            }
          ]
        }
      }
    with: {}

  - name: unified_rca
    type: ai.agent
    agent-id: elastic-ai-agent
    create-conversation: true
    with:
      message: |
        You are a Cisco NOC engineer. Produce a crisp cross-platform RCA for {{ inputs.site }}.

        Lead with the Splunk O11Y A2A narrative (use the stub text in
        steps.splunk_o11y_a2a_investigate — it is already workshop-ready). Then
        briefly reconcile Elastic Meraki/BGP timestamps and KB runbooks.

        Must include:
        - A clear stub disclaimer (mode=workshop_demo)
        - Detectors table/list (WAN_EDGE_BGP_SESSION_DOWN + MERAKI_AP_CLOUD_DISCONNECT)
        - Key metrics (latency p95, uplink saturation, BGP Idle)
        - Splunk hypothesis: WAN/BGP on edge-dfw-01 caused Meraki cloud disconnect — do not RMA the AP first
        - One sentence tying Elastic event timing to the ~4 minute gap

        <meraki_events>
        {{ steps.meraki_context.output | json }}
        </meraki_events>

        <network_events>
        {{ steps.network_context.output | json }}
        </network_events>

        <kb_runbooks>
        {{ steps.kb_runbooks.output | json }}
        </kb_runbooks>

        <splunk_o11y_a2a_response>
        {{ steps.splunk_o11y_a2a_investigate.output | json }}
        </splunk_o11y_a2a_response>

        Preferred shape:
        ## Splunk O11Y Correlated Issues
        ## Elastic evidence (timing)
        ## Likely root cause
        ## Recommended actions
        ## Runbooks to follow

  - name: triage_console
    type: console
    with:
      message: |
        Cisco Branch {{ inputs.site }} — Splunk O11Y A2A RCA complete (mode={{ consts.a2a_mode }}).

        Stub A2A result summary:
        {{ steps.splunk_o11y_a2a_investigate.output.result.parts[0].text | default: "see step output" }}

        Unified RCA: {{ steps.unified_rca.output.message | default: steps.unified_rca.output | json }}
